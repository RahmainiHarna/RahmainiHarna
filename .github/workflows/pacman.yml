name: Generate Pac-Man contribution graph

on:
  schedule:
    - cron: "0 */12 * * *"  
  workflow_dispatch:         

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate pacman graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: RahmainiHarna

      - name: Copy Pacman SVG to output folder
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          mkdir -p output
          cp dist/pacman-contribution-graph.svg output/
          git add output/pacman-contribution-graph.svg
          git commit -m "Update Pacman graph"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
